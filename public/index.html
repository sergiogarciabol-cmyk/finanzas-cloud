<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat Finanzas</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #667085;
        --line: #d8dee8;
        --brand: #0f766e;
        --bg: #f5f7fb;
        --panel: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      .login {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .login-panel {
        width: min(420px, 100%);
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .login-panel h1 {
        margin: 0 0 6px;
      }

      .login-panel p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.4;
      }

      .login-panel form {
        display: grid;
        gap: 10px;
      }

      .login-panel input {
        min-height: 48px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font: inherit;
      }

      .login-panel button {
        min-height: 48px;
      }

      #loginMessage {
        min-height: 20px;
        margin: 10px 0 0;
        color: #b42318;
        font-size: 14px;
      }

      main {
        width: min(920px, 100%);
        margin: 0 auto;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background: var(--panel);
      }

      header {
        padding: 18px 18px 12px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      header p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      #chat {
        padding: 16px;
        overflow: auto;
      }

      .msg {
        width: fit-content;
        max-width: min(760px, 92%);
        padding: 11px 13px;
        margin: 0 0 10px;
        border-radius: 8px;
        line-height: 1.4;
        white-space: pre-wrap;
      }

      .user {
        margin-left: auto;
        background: #d1fae5;
      }

      .assistant {
        background: #eef2f7;
      }

      .msg a {
        color: #0f5f59;
        font-weight: 700;
      }

      .msg a[href*="docs.google.com"] {
        display: inline-block;
        margin-top: 4px;
        padding: 9px 12px;
        border-radius: 8px;
        background: var(--brand);
        color: #fff;
        text-decoration: none;
      }

      #form {
        display: flex;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid var(--line);
        background: #fff;
      }

      textarea {
        flex: 1;
        min-height: 48px;
        max-height: 140px;
        resize: vertical;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font: inherit;
      }

      button {
        min-width: 96px;
        border: 0;
        border-radius: 8px;
        background: var(--brand);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }
    </style>
  </head>
  <body>
    <section id="login" class="login" hidden>
      <div class="login-panel">
        <h1>Chat Finanzas</h1>
        <p>Ingresa la contraseña de acceso para abrir tu asistente financiero.</p>
        <form id="loginForm">
          <input id="password" type="password" autocomplete="current-password" placeholder="Contraseña" />
          <button type="submit">Entrar</button>
        </form>
        <p id="loginMessage"></p>
      </div>
    </section>

    <main id="app" hidden>
      <header>
        <h1>Chat Finanzas</h1>
        <p>Registra ingresos, gastos, deudas y consulta tu Dashboard desde el teléfono.</p>
      </header>

      <section id="chat">
        <div class="msg assistant">Hola. Puedo ayudarte a registrar movimientos o mostrar el informe de Finanzas.</div>
      </section>

      <form id="form">
        <textarea id="input" placeholder="Ej: Registrar 100 bolivianos de gasto por almuerzo"></textarea>
        <button id="send" type="submit">Enviar</button>
      </form>
    </main>

    <script>
      const chat = document.querySelector("#chat");
      const form = document.querySelector("#form");
      const input = document.querySelector("#input");
      const send = document.querySelector("#send");
      const app = document.querySelector("#app");
      const login = document.querySelector("#login");
      const loginForm = document.querySelector("#loginForm");
      const password = document.querySelector("#password");
      const loginMessage = document.querySelector("#loginMessage");
      const messages = [];
      let pendingDraft = null;
      let accessPassword = sessionStorage.getItem("finanzas_password") || "";

      function showApp() {
        login.hidden = true;
        app.hidden = false;
        input.focus();
      }

      function showLogin(message = "") {
        app.hidden = true;
        login.hidden = false;
        loginMessage.textContent = message;
        password.focus();
      }

      function appendFormatted(parent, content) {
        const text = String(content || "");
        const pattern = /(\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)|\*\*([^*]+)\*\*)/g;
        let index = 0;
        let match;

        while ((match = pattern.exec(text))) {
          if (match.index > index) {
            parent.appendChild(document.createTextNode(text.slice(index, match.index)));
          }

          if (match[2] && match[3]) {
            const link = document.createElement("a");
            link.href = match[3];
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.textContent = match[2];
            parent.appendChild(link);
          } else if (match[4]) {
            const strong = document.createElement("strong");
            strong.textContent = match[4];
            parent.appendChild(strong);
          }

          index = pattern.lastIndex;
        }

        if (index < text.length) {
          parent.appendChild(document.createTextNode(text.slice(index)));
        }
      }

      function addMessage(role, content) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        appendFormatted(div, content);
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      async function loadStatus() {
        try {
          const response = await fetch("/api/chat");
          const data = await response.json();
          if (data.authRequired && !accessPassword) {
            showLogin();
          } else {
            showApp();
          }
        } catch {
          showApp();
        }
      }

      loginForm.addEventListener("submit", (event) => {
        event.preventDefault();
        accessPassword = password.value.trim();
        if (!accessPassword) {
          showLogin("Escribe la contraseña para continuar.");
          return;
        }
        sessionStorage.setItem("finanzas_password", accessPassword);
        password.value = "";
        showApp();
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        input.value = "";
        addMessage("user", text);
        messages.push({ role: "user", content: text });
        send.disabled = true;

        try {
          const headers = { "Content-Type": "application/json" };
          if (accessPassword) headers["x-finanzas-password"] = accessPassword;

          const response = await fetch("/api/chat", {
            method: "POST",
            headers,
            body: JSON.stringify({ messages, pendingDraft }),
          });
          const data = await response.json();
          if (response.status === 401) {
            sessionStorage.removeItem("finanzas_password");
            accessPassword = "";
            showLogin(data.error || "Contraseña incorrecta.");
            return;
          }
          if (!response.ok) throw new Error(data.error || "Error desconocido");
          pendingDraft = data.pendingDraft || null;
          addMessage("assistant", data.reply);
          messages.push({ role: "assistant", content: data.reply });
        } catch (error) {
          addMessage("assistant", `No pude responder: ${error.message}`);
        } finally {
          send.disabled = false;
          input.focus();
        }
      });

      loadStatus();
    </script>
  </body>
</html>
